name: Claude PR Review

on:
  pull_request:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude-review:
    if: |
      (github.event_name == 'pull_request' && !contains(github.event.pull_request.body, '@claude noreview')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude review')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude review')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude review'))
    uses: Invarion/DevTeamTasksRepo/.github/workflows/claude_pr_review.yml@main
    secrets:
      DEV_CLAUDE_TOKEN: ${{ secrets.DEV_CLAUDE_TOKEN }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      ORG_PROJECTS_PAT: ${{ secrets.ORG_PROJECTS_PAT }}
