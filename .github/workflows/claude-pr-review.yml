name: Claude PR Review

on:
  pull_request:
    types: [opened, reopened]
  issue_comment:
  pull_request_review_comment:
  pull_request_review:
  
    
jobs:
  claude-review:
    if: |
      (github.event_name == 'pull_request' && !contains(github.event.pull_request.body, '@claude noreview')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude review')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude review')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude review'))
      
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write  # needed to post review comments
      issues: read
      id-token: write

    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review              
        uses: anthropics/claude-code-action@v1
        with:
          track_progress: true
          claude_code_oauth_token: ${{ secrets.DEV_CLAUDE_TOKEN }}
          claude_args: "--allowedTools 'Bash(gh pr:*),Bash(gh issue:*),Bash(echo:*)'"
#add "mcp__github_inline_comment__create_inline_comment" to allow inline comments
          prompt: |        
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            
            Perform a comprehensive code review with the following focus areas:
            
            1. **Code Quality**
               - Clean code principles and best practices
               - Proper error handling and edge cases
               - Code readability and maintainability
            
            2. **Security**
               - Check for potential security vulnerabilities
               - Validate input sanitization
               - Review authentication/authorization logic
            
            3. **Performance**
               - Identify potential performance bottlenecks
               - Review database queries for efficiency
               - Check for memory leaks or resource issues
            
            Use top-level comments for general observations or praise.
            
            If you can't write the assessment due to any issues, post
            a pull request comment saying that you give up and why. 
#Alternative comment instructions:

#Use top-level comments to provide feedback, general comments and praise
#Provide detailed feedback using inline comments for specific issues.
            
      - name: Error comment
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_PROJECTS_PAT }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Sorry, Claude failed to produce a review. See **Claude PR Review** action logs for details.'
            })
